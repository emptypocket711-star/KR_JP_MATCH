name: hana
description: Hana — Korea-Japan matchmaking app built with Flutter and Firebase.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^17.2.1

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  cloud_functions: ^6.2.0
  firebase_messaging: ^16.2.0
  firebase_app_check: ^0.4.3
  google_sign_in: ^6.0.0

  # UI and media
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  flutter_card_swiper: ^7.0.1

  # Localization
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
    - assets/images/

  fonts:
    - family: MaruBuri
      fonts:
        - asset: assets/fonts/MaruBuri-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/MaruBuri-Light.ttf
          weight: 300
        - asset: assets/fonts/MaruBuri-Regular.ttf
          weight: 400
        - asset: assets/fonts/MaruBuri-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/MaruBuri-Bold.ttf
          weight: 700
